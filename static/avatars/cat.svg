<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8D6E63;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="50" cy="50" r="50" fill="url(#catGrad)"/>
  <!-- 猫耳朵 -->
  <path d="M25 45 L20 25 L40 38 Z" fill="#FFCCBC"/>
  <path d="M23 42 L22 30 L36 40 Z" fill="#FFAB91"/>
  <path d="M75 45 L80 25 L60 38 Z" fill="#FFCCBC"/>
  <path d="M77 42 L78 30 L64 40 Z" fill="#FFAB91"/>
  <!-- 头部 -->
  <ellipse cx="50" cy="58" rx="28" ry="24" fill="#FFCCBC"/>
  <!-- 头顶花纹 -->
  <path d="M45 38 Q50 35 55 38" fill="none" stroke="#8D6E63" stroke-width="2"/>
  <path d="M42 42 Q50 38 58 42" fill="none" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- 脸颊 -->
  <ellipse cx="30" cy="60" rx="8" ry="6" fill="#FFAB91" opacity="0.5"/>
  <ellipse cx="70" cy="60" rx="8" ry="6" fill="#FFAB91" opacity="0.5"/>
  <!-- 眼睛（猫眼） -->
  <ellipse cx="40" cy="55" rx="6" ry="8" fill="#FFD54F"/>
  <ellipse cx="60" cy="55" rx="6" ry="8" fill="#FFD54F"/>
  <!-- 瞳孔（竖瞳） -->
  <ellipse cx="40" cy="55" rx="2" ry="6" fill="#1A1A1A"/>
  <ellipse cx="60" cy="55" rx="2" ry="6" fill="#1A1A1A"/>
  <!-- 眼神高光 -->
  <circle cx="41" cy="52" r="1.5" fill="white"/>
  <circle cx="61" cy="52" r="1.5" fill="white"/>
  <!-- 鼻子 -->
  <path d="M47 64 L50 68 L53 64 Z" fill="#FFAB91"/>
  <!-- 嘴巴（猫嘴） -->
  <path d="M50 68 Q45 72 42 68" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 68 Q55 72 58 68" fill="none" stroke="#5D4037" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="32" y1="62" x2="15" y2="60" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="32" y1="65" x2="15" y2="65" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="32" y1="68" x2="15" y2="70" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="68" y1="62" x2="85" y2="60" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="68" y1="65" x2="85" y2="65" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="68" y1="68" x2="85" y2="70" stroke="#5D4037" stroke-width="1.5"/>
  <!-- 身体 -->
  <ellipse cx="50" cy="88" rx="20" ry="10" fill="#FFCCBC"/>
  <!-- 爪子 -->
  <ellipse cx="42" cy="85" rx="3" ry="2" fill="#FFAB91"/>
  <ellipse cx="50" cy="86" rx="3" ry="2" fill="#FFAB91"/>
  <ellipse cx="58" cy="85" rx="3" ry="2" fill="#FFAB91"/>
