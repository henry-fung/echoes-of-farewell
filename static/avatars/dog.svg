<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A1887F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="50" cy="50" r="50" fill="url(#dogGrad)"/>
  <!-- 狗耳朵（下垂） -->
  <ellipse cx="22" cy="50" rx="10" ry="14" fill="#8D6E63"/>
  <ellipse cx="78" cy="50" rx="10" ry="14" fill="#8D6E63"/>
  <ellipse cx="22" cy="50" rx="6" ry="10" fill="#FFCCBC" opacity="0.5"/>
  <ellipse cx="78" cy="50" rx="6" ry="10" fill="#FFCCBC" opacity="0.5"/>
  <!-- 头部 -->
  <ellipse cx="50" cy="58" rx="28" ry="24" fill="#FFCCBC"/>
  <!-- 额头花纹 -->
  <path d="M50 38 L45 48 L50 45 L55 48 Z" fill="#8D6E63"/>
  <!-- 眉毛（ expressive） -->
  <ellipse cx="40" cy="48" rx="5" ry="3" fill="#8D6E63"/>
  <ellipse cx="60" cy="48" rx="5" ry="3" fill="#8D6E63"/>
  <!-- 眼睛（忠诚温暖） -->
  <ellipse cx="40" cy="54" rx="5" ry="5" fill="#5D4037"/>
  <ellipse cx="60" cy="54" rx="5" ry="5" fill="#5D4037"/>
  <!-- 眼神高光 -->
  <circle cx="41" cy="53" r="2" fill="white"/>
  <circle cx="61" cy="53" r="2" fill="white"/>
  <!-- 鼻子（大而圆） -->
  <ellipse cx="50" cy="64" rx="6" ry="4" fill="#3E2723"/>
  <ellipse cx="48" cy="63" rx="2" ry="1" fill="white" opacity="0.6"/>
  <!-- 嘴巴（开心吐舌） -->
  <path d="M42 70 Q50 74 58 70" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <!-- 舌头 -->
  <path d="M48 72 Q50 78 52 72" fill="#E57373" stroke="#D84315" stroke-width="1"/>
  <!-- 脸颊 -->
  <ellipse cx="32" cy="62" rx="6" ry="5" fill="#FFAB91" opacity="0.4"/>
  <ellipse cx="68" cy="62" rx="6" ry="5" fill="#FFAB91" opacity="0.4"/>
  <!-- 身体 -->
  <ellipse cx="50" cy="90" rx="18" ry="8" fill="#FFCCBC"/>
  <!-- 前爪 -->
  <ellipse cx="44" cy="87" rx="3" ry="2.5" fill="#FFCCBC"/>
  <ellipse cx="56" cy="87" rx="3" ry="2.5" fill="#FFCCBC"/>
  <!-- 尾巴（摇尾巴） -->
  <path d="M68 85 Q75 80 78 75" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
</svg>
