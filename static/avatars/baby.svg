  <ellipse cx="50" cy="60" rx="24" ry="22" fill="#FFCCBC"/>
  <!-- 眉毛（淡淡的） -->
  <path d="M40 52 Q43 51 46 52" fill="none" stroke="#BDBDBD" stroke-width="1"/>
  <path d="M54 52 Q57 51 60 52" fill="none" stroke="#BDBDBD" stroke-width="1"/>
  <!-- 眼睛（天真无邪） -->
  <ellipse cx="42" cy="58" rx="4" ry="3.5" fill="#5D4037"/>
  <ellipse cx="58" cy="58" rx="4" ry="3.5" fill="#5D4037"/>
  <!-- 眼神高光（大） -->
  <circle cx="43" cy="57" r="1.5" fill="white"/>
  <circle cx="59" cy="57" r="1.5" fill="white"/>
  <!-- 鼻子（很小） -->
  <circle cx="50" cy="63" r="1.5" fill="#E6A090"/>
  <!-- 嘴巴（嘟嘟嘴） -->
  <ellipse cx="50" cy="69" rx="4" ry="2.5" fill="#E57373"/>
  <path d="M46 68 Q50 70 54 68" fill="none" stroke="#D84315" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 脸颊红晕（明显） -->
  <ellipse cx="34" cy="64" rx="5" ry="3" fill="#FFCDD2" opacity="0.8"/>
  <ellipse cx="66" cy="64" rx="5" ry="3" fill="#FFCDD2" opacity="0.8"/>
  <!-- 下巴（双下巴） -->
  <path d="M42 74 Q50 77 58 74" fill="none" stroke="#E0C0B0" stroke-width="1"/>
  <!-- 衣服（婴儿服） -->
  <path d="M30 88 L44 80 L50 82 L56 80 L70 88" fill="#81C784"/>
  <!-- 围嘴 -->
  <path d="M44 80 Q50 90 56 80" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1"/>
  <circle cx="50" cy="84" r="2" fill="#E53935"/>
</svg>
