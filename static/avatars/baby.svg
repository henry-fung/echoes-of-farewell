<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="babyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBC02D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="50" cy="50" r="50" fill="url(#babyGrad)"/>
  <!-- 耳朵 -->
  <ellipse cx="24" cy="58" rx="3.5" ry="4" fill="#FFCCBC"/>
  <ellipse cx="76" cy="58" rx="3.5" ry="4" fill="#FFCCBC"/>
  <!-- 脖子 -->
  <rect x="46" y="80" width="8" height="6" fill="#FFCCBC"/>
  <!-- 头发（稀疏胎毛） -->
  <ellipse cx="50" cy="40" rx="22" ry="12" fill="#8D6E63" opacity="0.6"/>
  <path d="M35 42 L38 38 L40 42" fill="none" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>
  <path d="M45 40 L47 36 L50 40" fill="none" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>
  <path d="M55 40 L58 36 L60 40" fill="none" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>
  <path d="M62 42 L65 38 L67 42" fill="none" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>
  <!-- 囟门 -->
  <ellipse cx="50" cy="36" rx="6" ry="4" fill="#FFCCBC" opacity="0.8"/>
