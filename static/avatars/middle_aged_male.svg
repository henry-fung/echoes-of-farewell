<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="middleAgedMaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949AB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <circle cx="50" cy="50" r="50" fill="url(#middleAgedMaleGrad)"/>
  <!-- 耳朵 -->
  <ellipse cx="20" cy="55" rx="5" ry="7" fill="#FFCCBC"/>
  <ellipse cx="80" cy="55" rx="5" ry="7" fill="#FFCCBC"/>
  <!-- 脖子 -->
  <rect x="42" y="76" width="16" height="12" fill="#FFCCBC"/>
  <!-- 头发（黑色带少许灰白） -->
  <ellipse cx="50" cy="35" rx="26" ry="16" fill="#212121"/>
  <path d="M30 32 Q35 28 45 30" fill="none" stroke="#757575" stroke-width="1.5"/>
  <path d="M55 30 Q65 28 70 32" fill="none" stroke="#757575" stroke-width="1.5"/>
  <!-- 发际线 -->
  <path d="M25 42 Q30 35 50 33 Q70 35 75 42" fill="none" stroke="#212121" stroke-width="2"/>
  <!-- 脸部 -->
  <ellipse cx="50" cy="55" rx="24" ry="26" fill="#FFCCBC"/>
  <!-- 额头纹 -->
  <path d="M42 44 Q50 43 58 44" fill="none" stroke="#D7CCC8" stroke-width="1"/>
  <!-- 眉毛（浓密） -->
  <path d="M36 48 Q42 46 48 48" fill="none" stroke="#212121" stroke-width="2.5"/>
  <path d="M52 48 Q58 46 64 48" fill="none" stroke="#212121" stroke-width="2.5"/>
  <!-- 眼睛 -->
  <ellipse cx="42" cy="54" rx="4" ry="3" fill="#3E2723"/>
  <ellipse cx="58" cy="54" rx="4" ry="3" fill="#3E2723"/>
  <!-- 鼻子 -->
  <path d="M50 56 L48 63 L52 63 Z" fill="#E6A090"/>
  <!-- 嘴巴（稳重的微笑） -->
  <path d="M44 68 Q50 71 56 68" fill="none" stroke="#D84315" stroke-width="2" stroke-linecap="round"/>
  <!-- 下巴胡茬 -->
  <path d="M42 74 Q50 76 58 74" fill="none" stroke="#424242" stroke-width="1" opacity="0.5"/>
  <!-- 衣服领子（衬衫） -->
  <path d="M25 90 L40 78 L50 82 L60 78 L75 90" fill="#1565C0"/>
  <path d="M40 78 L50 88 L60 78" fill="white" opacity="0.3"/>
